<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
.page {
  display:flex; align-items:center; justify-content:center;
  min-height:620px; background:#050510; padding:40px 20px;
}
.card {
  width:320px; height:520px;
  background:#07071a;
  border-radius:24px;
  border:1.5px solid #00f0ff;
  box-shadow:0 0 32px #00f0ff33, 0 0 80px #ff00cc11, inset 0 0 24px #00f0ff08;
  padding:44px 32px 36px;
  display:flex; flex-direction:column; align-items:center;
  position:relative; overflow:hidden;
}
.scanline {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,240,255,0.022) 3px, rgba(0,240,255,0.022) 4px);
  pointer-events:none; border-radius:24px;
}
.corner { position:absolute; width:20px; height:20px; border-color:#ff00cc; border-style:solid; }
.corner.tl { top:-1px; left:-1px; border-width:2px 0 0 2px; border-radius:24px 0 0 0; box-shadow:-2px -2px 10px #ff00ccaa; }
.corner.tr { top:-1px; right:-1px; border-width:2px 2px 0 0; border-radius:0 24px 0 0; box-shadow:2px -2px 10px #ff00ccaa; }
.corner.bl { bottom:-1px; left:-1px; border-width:0 0 2px 2px; border-radius:0 0 0 24px; box-shadow:-2px 2px 10px #ff00ccaa; }
.corner.br { bottom:-1px; right:-1px; border-width:0 2px 2px 0; border-radius:0 0 24px 0; box-shadow:2px 2px 10px #ff00ccaa; }

.eye-container { width:130px; height:70px; margin-bottom:28px; position:relative; }
.eye-svg { width:100%; height:100%; overflow:visible; }

.title-neon {
  font-family:'Orbitron',monospace;
  font-size:30px; font-weight:900;
  color:#00f0ff; letter-spacing:10px;
  text-shadow:0 0 8px #00f0ff, 0 0 24px #00f0ffbb, 0 0 48px #00f0ff44;
  animation:flicker 5s infinite;
  margin-bottom:6px;
}
.sub-glitch {
  font-family:'Orbitron',monospace;
  font-size:13px; font-weight:700;
  color:#ff00cc; letter-spacing:10px;
  text-shadow:0 0 6px #ff00cc, 0 0 20px #ff00ccaa;
  margin-bottom:28px;
  position:relative;
  animation:glitch 3s infinite;
}
.sub-glitch::before, .sub-glitch::after {
  content:'CLUB';
  position:absolute; left:0; top:0;
  letter-spacing:10px;
}
.sub-glitch::before {
  color:#00f0ff; clip:rect(0,9999px,4px,0);
  animation:glitch-top 3s infinite; opacity:0.8;
}
.sub-glitch::after {
  color:#ff00cc; clip:rect(14px,9999px,999px,0);
  animation:glitch-bot 3s infinite; opacity:0.8;
}

.divider {
  width:100%; height:1px;
  background:linear-gradient(90deg,transparent,#00f0ff88,#ff00cc88,transparent);
  margin-bottom:20px;
}
.tagline {
  font-family:'Orbitron',monospace;
  font-size:8px; color:#00f0ff55; letter-spacing:3px; margin-bottom:24px;
}
.invite-box {
  border:1px solid #00f0ff33;
  border-radius:8px;
  padding:12px 20px;
  width:100%;
  box-sizing:border-box;
  margin-bottom:24px;
}
.invite-label {
  font-family:'Orbitron',monospace;
  font-size:7px; color:#00f0ff55; letter-spacing:2px; margin-bottom:4px;
}
.invite-code {
  font-family:'Orbitron',monospace;
  font-size:13px; font-weight:700; color:#00f0ff;
  letter-spacing:4px;
  text-shadow:0 0 6px #00f0ff88;
}
.dots { display:flex; gap:12px; margin-top:auto; }
.dot { width:7px; height:7px; border-radius:50%; animation:pulse 2s infinite; }
.dot:nth-child(1){ background:#ff00cc; box-shadow:0 0 8px #ff00cc; }
.dot:nth-child(2){ background:#00f0ff; box-shadow:0 0 8px #00f0ff; animation-delay:.5s; }
.dot:nth-child(3){ background:#ff00cc; box-shadow:0 0 8px #ff00cc; animation-delay:1s; }

@keyframes flicker { 0%,92%,100%{opacity:1} 93%{opacity:.6} 94%{opacity:1} 96%{opacity:.4} 97%{opacity:1} }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }
@keyframes glitch {
  0%,85%,100%{transform:translate(0)} 
  86%{transform:translate(-3px,0)} 
  87%{transform:translate(3px,0)} 
  88%{transform:translate(0)} 
  90%{transform:translate(2px,1px)} 
  91%{transform:translate(-2px,-1px)} 
  92%{transform:translate(0)}
}
@keyframes glitch-top {
  0%,85%,100%{transform:translate(0); clip:rect(0,9999px,4px,0); opacity:0}
  86%{transform:translate(-4px,0); clip:rect(0,9999px,6px,0); opacity:0.9}
  87%{transform:translate(4px,0); clip:rect(2px,9999px,8px,0); opacity:0.9}
  88%{transform:translate(0); opacity:0}
  90%{transform:translate(3px,0); clip:rect(0,9999px,5px,0); opacity:0.8}
  92%{opacity:0}
}
@keyframes glitch-bot {
  0%,85%,100%{transform:translate(0); clip:rect(14px,9999px,999px,0); opacity:0}
  86%{transform:translate(4px,0); clip:rect(12px,9999px,999px,0); opacity:0.9}
  87%{transform:translate(-4px,0); clip:rect(10px,9999px,999px,0); opacity:0.9}
  88%{transform:translate(0); opacity:0}
  90%{transform:translate(-3px,0); clip:rect(14px,9999px,999px,0); opacity:0.8}
  92%{opacity:0}
}
</style>

<div class="page">
  <div class="card">
    <div class="scanline"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="eye-container">
      <svg class="eye-svg" viewBox="0 0 130 70" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="eyeclip">
            <ellipse id="clipEllipse" cx="65" cy="35" rx="58" ry="30"/>
          </clipPath>
        </defs>
        <ellipse cx="65" cy="35" rx="58" ry="30" fill="none" stroke="#00f0ff" stroke-width="1.5"
          style="filter:drop-shadow(0 0 6px #00f0ff) drop-shadow(0 0 14px #00f0ff88)"/>
        <g clip-path="url(#eyeclip)">
          <circle id="iris" cx="65" cy="35" r="18" fill="#0a0a2a" stroke="#ff00cc" stroke-width="1.5"
            style="filter:drop-shadow(0 0 6px #ff00cc)"/>
          <circle id="pupil" cx="65" cy="35" r="8" fill="#ff00cc" opacity="0.9"
            style="filter:drop-shadow(0 0 8px #ff00cc)"/>
          <circle id="shine" cx="70" cy="30" r="3.5" fill="white" opacity="0.7"/>
        </g>
      </svg>
    </div>

    <div class="title-neon">SECRET</div>
    <div class="sub-glitch">CLUB</div>
    <div class="divider"></div>
    <div class="invite-box">
      <div class="invite-label">MEMBER ACCESS CODE</div>
      <div class="invite-code">SC-2024-∞</div>
    </div>
    <div class="tagline">BY INVITATION ONLY</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<script>
const iris = document.getElementById('iris');
const pupil = document.getElementById('pupil');
const shine = document.getElementById('shine');
const clipEllipse = document.getElementById('clipEllipse');
const card = document.querySelector('.card');

let targetX = 65, targetY = 35, currentX = 65, currentY = 35;

document.addEventListener('mousemove', e => {
  const rect = card.getBoundingClientRect();
  const eyeCenterX = rect.left + rect.width / 2;
  const eyeCenterY = rect.top + 114;
  const dx = e.clientX - eyeCenterX;
  const dy = e.clientY - eyeCenterY;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const maxMove = 12;
  const pull = Math.min(dist, 120) / 120;
  targetX = 65 + (dx / dist) * maxMove * pull;
  targetY = 35 + (dy / dist) * maxMove * 0.45 * pull;
});

function lerp(a, b, t) { return a + (b - a) * t; }

(function loop() {
  currentX = lerp(currentX, targetX, 0.09);
  currentY = lerp(currentY, targetY, 0.09);
  iris.setAttribute('cx', currentX);
  iris.setAttribute('cy', currentY);
  pupil.setAttribute('cx', currentX);
  pupil.setAttribute('cy', currentY);
  shine.setAttribute('cx', currentX + 5);
  shine.setAttribute('cy', currentY - 5);
  requestAnimationFrame(loop);
})();

let blinkRy = 30, blinkDir = -1, blinking = false;
function scheduleBlink() {
  setTimeout(() => { blinking = true; blinkDir = -1; blinkLoop(); }, 1800 + Math.random()*3000);
}
function blinkLoop() {
  if (!blinking) return;
  blinkRy += blinkDir * 4;
  if (blinkRy <= 0) { blinkRy = 0; blinkDir = 1; }
  if (blinkRy >= 30) { blinkRy = 30; blinking = false; scheduleBlink(); }
  clipEllipse.setAttribute('ry', blinkRy);
  document.querySelector('.eye-svg ellipse').setAttribute('ry', blinkRy);
  requestAnimationFrame(blinkLoop);
}
scheduleBlink();
</script>
