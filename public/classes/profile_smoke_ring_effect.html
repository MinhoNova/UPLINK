
<style>
  .demo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 2rem 0;
  }
  canvas { display: block; }
  .controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 13px;
    color: var(--color-text-secondary);
  }
  .ctrl { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .code-hint {
    font-size: 12px;
    color: var(--color-text-tertiary);
    text-align: center;
    max-width: 480px;
    line-height: 1.6;
  }
</style>

<div class="demo-wrap">
  <canvas id="c" width="320" height="320"></canvas>
  <div class="controls">
    <div class="ctrl">
      <label for="speed">سرعة</label>
      <input type="range" id="speed" min="1" max="10" value="4" step="1" style="width:100px">
    </div>
    <div class="ctrl">
      <label for="count">كثافة</label>
      <input type="range" id="count" min="40" max="200" value="90" step="10" style="width:100px">
    </div>
    <div class="ctrl">
      <label for="colorMode">لون</label>
      <select id="colorMode" style="font-size:13px; padding: 2px 6px;">
        <option value="white">أبيض دخاني</option>
        <option value="gold">ذهبي</option>
        <option value="cyan">سماوي</option>
        <option value="fire">ناري</option>
      </select>
    </div>
  </div>
  <p class="code-hint">اضغط "اعمل لي الكود" عشان تاخد الـ CSS/JS الجاهز للسايت بتاعك</p>
  <button onclick="sendPrompt('اعمل لي الكود الكامل للـ profile ring effect عشان أحطه في سايتي')">اعمل لي الكود ↗</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 320, H = 320, cx = W/2, cy = H/2;
const R = 110;

let speedVal = 4, countVal = 90, colorMode = 'white';

document.getElementById('speed').addEventListener('input', e => { speedVal = +e.target.value; });
document.getElementById('count').addEventListener('input', e => {
  countVal = +e.target.value;
  initParticles();
});
document.getElementById('colorMode').addEventListener('change', e => { colorMode = e.target.value; });

function getColor(alpha, t, noise) {
  if (colorMode === 'white') return `rgba(255,255,255,${alpha})`;
  if (colorMode === 'gold') return `rgba(255,${Math.floor(180 + noise*50)},${Math.floor(30 + noise*40)},${alpha})`;
  if (colorMode === 'cyan') return `rgba(${Math.floor(80+noise*60)},${Math.floor(200+noise*55)},255,${alpha})`;
  if (colorMode === 'fire') {
    const r = 255, g = Math.floor(80 + noise * 120), b = Math.floor(noise * 40);
    return `rgba(${r},${g},${b},${alpha})`;
  }
}

let particles = [];

function initParticles() {
  particles = [];
  for (let i = 0; i < countVal; i++) {
    const angle = (Math.PI * 2 * i) / countVal + Math.random() * 0.3;
    const radialOffset = (Math.random() - 0.5) * 28;
    particles.push({
      baseAngle: angle,
      angleOffset: Math.random() * Math.PI * 2,
      speed: 0.004 + Math.random() * 0.006,
      radial: radialOffset,
      radialAmp: 4 + Math.random() * 10,
      radialFreq: 0.5 + Math.random() * 1.5,
      life: Math.random(),
      lifeSpeed: 0.003 + Math.random() * 0.005,
      size: 1.2 + Math.random() * 3.5,
      noise: Math.random()
    });
  }
}

initParticles();

let t = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // profile circle placeholder
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, 88, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('صورة البروفايل', cx, cy+5);
  ctx.restore();

  // particles
  for (const p of particles) {
    p.angleOffset += p.speed * speedVal * 0.25;
    const angle = p.baseAngle + p.angleOffset;
    const wave = Math.sin(p.angleOffset * p.radialFreq) * p.radialAmp;
    const r = R + p.radial + wave;

    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;

    p.life += p.lifeSpeed;
    if (p.life > 1) p.life = 0;

    const alpha = Math.sin(p.life * Math.PI) * 0.7;
    const size = p.size * (0.6 + 0.4 * Math.sin(p.life * Math.PI));

    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI*2);
    ctx.fillStyle = getColor(alpha, t, p.noise);
    ctx.fill();
  }

  // soft glow ring
  const grad = ctx.createRadialGradient(cx, cy, R-18, cx, cy, R+18);
  grad.addColorStop(0, 'rgba(255,255,255,0)');
  if (colorMode === 'white') grad.addColorStop(0.5, 'rgba(255,255,255,0.03)');
  else if (colorMode === 'gold') grad.addColorStop(0.5, 'rgba(255,200,50,0.04)');
  else if (colorMode === 'cyan') grad.addColorStop(0.5, 'rgba(80,220,255,0.04)');
  else grad.addColorStop(0.5, 'rgba(255,100,20,0.04)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.lineWidth = 36;
  ctx.strokeStyle = grad;
  ctx.stroke();

  t++;
  requestAnimationFrame(draw);
}

draw();
</script>
